    <script>
        // apply the saved theme before paint to avoid a flash of the wrong scheme
        (function () {
            const saved = localStorage.getItem('pdfviewer-theme');

            if (saved === 'light' || saved === 'dark') {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>

    <style>
        :root {
            --viewer-bg: #525659;
            --toolbar-bg: #323639;
            --toolbar-fg: #f1f1f1;
            --toolbar-border: rgba(255, 255, 255, 0.12);
            --page-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* start screen */
        #startScreen {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: var(--bulma-scheme-main-bis);
            overflow-y: auto;
        }

        .theme-switch {
            position: absolute;
            top: 1rem;
            right: 1rem;
            margin-bottom: 0;
        }

        .start-card {
            width: 100%;
            max-width: 560px;
        }

        .dropzone {
            border: 2px dashed var(--bulma-border);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            transition: border-color .2s, background-color .2s;
            cursor: pointer;
            background: var(--bulma-scheme-main);
            color: var(--bulma-text);
        }

        .dropzone:hover {
            border-color: var(--bulma-link);
        }

        .dropzone-logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        /* viewer */
        #viewer {
            flex: 1;
            display: none;
            flex-direction: column;
            min-height: 0;
        }

        #toolbar {
            display: flex;
            align-items: center;
            gap: .4rem .6rem;
            padding: .4rem .6rem;
            background: var(--toolbar-bg);
            color: var(--toolbar-fg);
            border-bottom: 1px solid var(--toolbar-border);
            flex-wrap: wrap;
        }

        .toolbar-left,
        .toolbar-center,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: .3rem;
        }

        /* left and right grow equally so the page indicator stays centered */
        .toolbar-left {
            flex: 1 1 0;
            min-width: 0;
        }

        .toolbar-right {
            flex: 1 1 0;
            justify-content: flex-end;
        }

        .toolbar-center {
            flex: 0 0 auto;
        }

        .toolbar-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 40vw;
        }

        .tool-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2rem;
            height: 2rem;
            padding: 0 .5rem;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--toolbar-fg);
            font-size: 1rem;
            cursor: pointer;
            transition: background-color .15s;
        }

        .tool-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.14);
        }

        .tool-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-btn:disabled {
            opacity: .4;
            cursor: default;
        }

        .tool-logo {
            padding: 0 .25rem;
        }

        .tool-logo img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            display: block;
        }

        .page-indicator {
            display: flex;
            align-items: center;
            gap: .35rem;
            font-variant-numeric: tabular-nums;
        }

        .page-indicator input {
            width: 3.2rem;
            height: 2rem;
            text-align: center;
            border: 1px solid var(--toolbar-border);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.25);
            color: var(--toolbar-fg);
        }

        .zoom-level {
            min-width: 3.5rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        #pagesContainer {
            position: relative;
            flex: 1;
            overflow: auto;
            background: var(--viewer-bg);
            padding: 1.5rem 0;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            position: relative;
            margin: 0 auto 1.25rem auto;
            background: #fff;
            box-shadow: var(--page-shadow);
        }

        .page canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .page-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b9b9b9;
        }

        .page-spinner {
            width: 2.5rem;
            height: 2.5rem;
            border: 3px solid #e3e3e3;
            border-top-color: #9aa0a6;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* overlay */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: var(--bulma-scheme-main);
            z-index: 50;
            transition: opacity .25s;
        }

        #loadingOverlay.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* drag overlay */
        #dropOverlay {
            position: fixed;
            inset: 0;
            z-index: 55;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(50, 54, 57, 0.82);
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
        }

        #dropOverlay.is-active {
            display: flex;
        }

        .drop-hint {
            border: 3px dashed rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            padding: 3rem 4rem;
            text-align: center;
        }

        /* toast */
        #toast {
            position: fixed;
            left: 50%;
            bottom: 1.5rem;
            transform: translateX(-50%) translateY(2rem);
            z-index: 60;
            opacity: 0;
            transition: opacity .25s, transform .25s;
            pointer-events: none;
        }

        #toast.is-active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* debug console */
        #debugConsole {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            width: min(420px, 90vw);
            max-height: 40vh;
            overflow: auto;
            z-index: 40;
            display: none;
            font-size: .8rem;
        }

        #debugConsoleContent p {
            margin: 0 0 .25rem 0;
        }

        @media (max-width: 640px) {
            .toolbar-title {
                display: none;
            }

            #pagesContainer {
                padding: .75rem 0;
            }

            .tool-btn {
                min-width: 1.8rem;
                height: 1.8rem;
                padding: 0 .3rem;
            }

            .zoom-level {
                min-width: 2.6rem;
                font-size: .85rem;
            }

            .page-indicator input {
                width: 2.6rem;
                height: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- start screen -->
        <section id="startScreen">
            <div class="theme-switch buttons has-addons">
                <button data-theme-choice="system" class="button is-small" title="Follow system theme">System</button>
                <button data-theme-choice="light" class="button is-small" title="Light theme">Light</button>
                <button data-theme-choice="dark" class="button is-small" title="Dark theme">Dark</button>
            </div>

            <div class="start-card">
                <h1 class="title is-4 has-text-centered">PDF Viewer</h1>
                <p class="subtitle is-6 has-text-centered has-text-grey">

                </p>

                    <input id="fileInput" type="file" accept="application/pdf" hidden>
                </div>

                <div class="field has-addons mt-5">
                    <div class="control is-expanded">
                        <input id="urlInput" class="input" type="text" placeholder="Or paste a public PDF URL">
                    </div>
                    <div class="control">
                        <button id="urlButton" class="button is-link">Open</button>
                    </div>
                </div>

                <p class="has-text-centered has-text-grey is-size-7 mt-6">
                    Powered by the open source
                    <a target="_blank" href="https://github.com/paulocoutinhox/pdfium-lib">PDF Viewer</a>
                    project, running entirely on the client side. PDFium branch "chromium/7902".
                </p>
            </div>
        </section>

        <!-- viewer -->
        <section id="viewer">
            <div id="toolbar">
                <div class="toolbar-left">
                    <button id="openButton" class="tool-btn tool-logo" title="Open another file">
                        <img src="logo.png?v=chromium/7902" alt="PDF Viewer">
                    </button>
                    <span id="fileTitle" class="toolbar-title"></span>
                </div>

                <div class="toolbar-center page-indicator">
                    <button id="prevPage" class="tool-btn" title="Previous page">‹</button>
                    <input id="pageInput" type="text" inputmode="numeric" value="1">
                    <span>/</span>
                    <span id="pageCount">0</span>
                    <button id="nextPage" class="tool-btn" title="Next page">›</button>
                </div>

                <div class="toolbar-right">
                    <button id="zoomOut" class="tool-btn" title="Zoom out">−</button>
                    <span id="zoomLevel" class="zoom-level">100%</span>
                    <button id="zoomIn" class="tool-btn" title="Zoom in">+</button>
                    <button id="fitWidth" class="tool-btn" title="Fit width">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 9V5a2 2 0 0 1 2-2h4M21 9V5a2 2 0 0 0-2-2h-4M3 15v4a2 2 0 0 0 2 2h4M21 15v4a2 2 0 0 1-2 2h-4" />
                        </svg>
                    </button>
                    <button id="downloadButton" class="tool-btn" title="Download">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3v12M7 10l5 5 5-5M5 21h14" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="pagesContainer"></div>
        </section>
    </div>

    <!-- loading overlay -->
    <div id="loadingOverlay">
        <div class="page-spinner"></div>
        <p id="loadingText" class="has-text-grey">Loading engine…</p>
    </div>

    <!-- drag overlay -->
    <div id="dropOverlay">
        <div class="drop-hint">
            <img class="dropzone-logo" src="logo.png?v=chromium/7902" alt="PDF Viewer">
            <p class="mt-3">Drop the PDF to open it</p>
        </div>
    </div>

    <!-- toast -->
    <div id="toast" class="notification is-danger"></div>

    <!-- debug console -->
    <div id="debugConsole" class="box">
        <p class="has-text-weight-bold mb-2">Debug console</p>
        <div id="debugConsoleContent"></div>
    </div>

    <script>
        // pdfium render flags and bitmap constants
        const FPDF_FLAGS = {
            ANNOT: 0x01,
            REVERSE_BYTE_ORDER: 0x10,
        };

        const LAST_ERROR = {
            0: "success",
            1: "unknown error",
            2: "file not found or could not be opened",
            3: "file not in PDF format or corrupted",
            4: "password required or incorrect password",
            5: "unsupported security scheme",
            6: "page not found or content error",
        };

        const BITMAP_BGRA = 4;
        const BYTES_PER_PIXEL = 4;

        // viewer tuning
        const MIN_ZOOM = 0.25;
        const MAX_ZOOM = 5.0;
        const ZOOM_STEP = 0.2;
        const RENDER_MARGIN_RATIO = 1.5;
        const MAX_PIXEL_DIMENSION = 4096;
        const PIXEL_RATIO = Math.min(window.devicePixelRatio || 1, 2);

        let Module = null;
        const FPDF = {};

        // document holds the live pdfium handles, the source bytes and the read callback
        let activeDocument = null;
        let zoom = 1.0;
        let fitMode = true;
        let currentPage = 1;
        let renderQueue = [];
        let pumpScheduled = false;
        let scrollRaf = null;

        // dom references
        const dom = {};

        // resolves once the wasm engine is ready to accept calls
        let markEngineReady;
        const engineReady = new Promise((resolve) => { markEngineReady = resolve; });

        // pdfium module bootstrap
        PDFiumModule().then((instance) => {
            Module = instance;
            bindFunctions();
            FPDF.Init();
            markEngineReady();
            setLoading(false);
            log("Engine ready");
        });

        function bindFunctions() {
            FPDF.Init = Module.cwrap('PDFium_Init');
            FPDF.LoadCustomDocument = Module.cwrap('FPDF_LoadCustomDocument', 'number', ['number', 'string']);
            FPDF.CloseDocument = Module.cwrap('FPDF_CloseDocument', '', ['number']);
            FPDF.GetPageCount = Module.cwrap('FPDF_GetPageCount', 'number', ['number']);
            FPDF.GetPageSizeByIndex = Module.cwrap('FPDF_GetPageSizeByIndex', 'number', ['number', 'number', 'number', 'number']);
            FPDF.GetLastError = Module.cwrap('FPDF_GetLastError', 'number');
            FPDF.LoadPage = Module.cwrap('FPDF_LoadPage', 'number', ['number', 'number']);
            FPDF.ClosePage = Module.cwrap('FPDF_ClosePage', '', ['number']);
            FPDF.RenderPageBitmap = Module.cwrap('FPDF_RenderPageBitmap', '', ['number', 'number', 'number', 'number', 'number', 'number', 'number', 'number']);
            FPDF.Bitmap_CreateEx = Module.cwrap('FPDFBitmap_CreateEx', 'number', ['number', 'number', 'number', 'number', 'number']);
            FPDF.Bitmap_FillRect = Module.cwrap('FPDFBitmap_FillRect', '', ['number', 'number', 'number', 'number', 'number', 'number']);
            FPDF.Bitmap_Destroy = Module.cwrap('FPDFBitmap_Destroy', '', ['number']);
        }

        // streaming loader: pdfium reads only the blocks it needs from the source bytes
        function openDocument(bytes, name, password = "") {
            closeDocument();

            // register the block reader so pdfium can pull ranges on demand
            const readBlock = (param, position, bufferPtr, size) => {
                Module.HEAPU8.set(bytes.subarray(position, position + size), bufferPtr);
                return 1;
            };

            const readerPtr = Module.addFunction(readBlock, 'iiiii');

            // build the FPDF_FILEACCESS struct: m_FileLen, m_GetBlock, m_Param
            const fileAccessPtr = Module.wasmExports.malloc(12);
            Module.setValue(fileAccessPtr + 0, bytes.length, 'i32');
            Module.setValue(fileAccessPtr + 4, readerPtr, 'i32');
            Module.setValue(fileAccessPtr + 8, 0, 'i32');

            const handle = FPDF.LoadCustomDocument(fileAccessPtr, password);

            // the struct is no longer needed once the document is created
            Module.wasmExports.free(fileAccessPtr);

            if (!handle) {
                Module.removeFunction(readerPtr);

                const code = FPDF.GetLastError();

                // ask for a password when the document is protected
                if (code === 4) {
                    const entered = window.prompt("This PDF is password protected. Enter the password:");

                    if (entered !== null) {
                        openDocument(bytes, name, entered);
                        return;
                    }
                }

                throw new Error(LAST_ERROR[code] || "could not open document");
            }

            const pageCount = FPDF.GetPageCount(handle);

            // reject documents that opened but carry no pages
            if (pageCount <= 0) {
                FPDF.CloseDocument(handle);
                Module.removeFunction(readerPtr);
                throw new Error("this document has no pages");
            }

            activeDocument = {
                handle,
                readerPtr,
                bytes,
                name,
                pageCount,
                sizes: new Array(pageCount).fill(null),
                rendered: new Set(),
            };

            log('Opened "' + name + '" with ' + pageCount + ' page(s)');

            // show the viewer first so the container has a real width to measure against
            showViewer(name, pageCount);
            buildPages();
            fitWidth();
        }

        function closeDocument() {
            if (!activeDocument) {
                return;
            }

            FPDF.CloseDocument(activeDocument.handle);
            Module.removeFunction(activeDocument.readerPtr);

            activeDocument = null;
            renderQueue = [];
        }

        // page size is cheap and does not require loading the full page
        function getPageSize(index) {
            const cached = activeDocument.sizes[index];

            if (cached) {
                return cached;
            }

            const widthPtr = Module.wasmExports.malloc(8);
            const heightPtr = Module.wasmExports.malloc(8);

            FPDF.GetPageSizeByIndex(activeDocument.handle, index, widthPtr, heightPtr);

            // read the doubles straight from the heap, malloc keeps them 8-byte aligned
            const size = {
                width: Module.HEAPF64[widthPtr >> 3],
                height: Module.HEAPF64[heightPtr >> 3],
            };

            Module.wasmExports.free(widthPtr);
            Module.wasmExports.free(heightPtr);

            activeDocument.sizes[index] = size;
            return size;
        }

        // render a single page into an image bitmap at the current zoom
        function renderPage(index) {
            const size = getPageSize(index);
            const scale = Math.min(zoom * PIXEL_RATIO, MAX_PIXEL_DIMENSION / Math.max(size.width, size.height));

            const pixelWidth = Math.max(1, Math.ceil(size.width * scale));
            const pixelHeight = Math.max(1, Math.ceil(size.height * scale));
            const byteCount = pixelWidth * pixelHeight * BYTES_PER_PIXEL;

            const bufferPtr = Module.wasmExports.malloc(byteCount);
            const bitmap = FPDF.Bitmap_CreateEx(pixelWidth, pixelHeight, BITMAP_BGRA, bufferPtr, pixelWidth * BYTES_PER_PIXEL);
            const page = FPDF.LoadPage(activeDocument.handle, index);

            FPDF.Bitmap_FillRect(bitmap, 0, 0, pixelWidth, pixelHeight, 0xFFFFFFFF);
            FPDF.RenderPageBitmap(bitmap, page, 0, 0, pixelWidth, pixelHeight, 0, FPDF_FLAGS.REVERSE_BYTE_ORDER | FPDF_FLAGS.ANNOT);

            // copy pixels out of the heap before releasing the native buffer
            const pixels = new Uint8ClampedArray(Module.HEAPU8.buffer, bufferPtr, byteCount).slice();

            FPDF.ClosePage(page);
            FPDF.Bitmap_Destroy(bitmap);
            Module.wasmExports.free(bufferPtr);

            return new ImageData(pixels, pixelWidth, pixelHeight);
        }

        // build placeholder elements sized by page aspect ratio without rendering yet
        function buildPages() {
            dom.pagesContainer.innerHTML = "";

            // a new document always starts at the top, never the previous scroll position
            dom.pagesContainer.scrollTop = 0;
            currentPage = 1;

            for (let index = 0; index < activeDocument.pageCount; index++) {
                const size = getPageSize(index);

                const page = document.createElement('div');
                page.className = "page";
                page.dataset.index = index;

                const placeholder = document.createElement('div');
                placeholder.className = "page-placeholder";
                placeholder.innerHTML = '<div class="page-spinner"></div>';
                page.appendChild(placeholder);

                dom.pagesContainer.appendChild(page);
                applyPageSize(page, size);
            }

            refreshVisiblePages();
        }

        function applyPageSize(page, size) {
            page.style.width = Math.round(size.width * zoom) + "px";
            page.style.height = Math.round(size.height * zoom) + "px";
        }

        // decide which pages to render and which to release based on the viewport
        function refreshVisiblePages() {
            const container = dom.pagesContainer;
            const margin = container.clientHeight * RENDER_MARGIN_RATIO;
            const top = container.scrollTop - margin;
            const bottom = container.scrollTop + container.clientHeight + margin;

            for (const page of container.children) {
                const index = Number(page.dataset.index);
                const visible = page.offsetTop + page.offsetHeight >= top && page.offsetTop <= bottom;

                if (visible && !activeDocument.rendered.has(index)) {
                    enqueueRender(index);
                } else if (!visible && activeDocument.rendered.has(index)) {
                    releasePage(page, index);
                }
            }

            updateCurrentPage();
        }

        function enqueueRender(index) {
            if (!renderQueue.includes(index)) {
                renderQueue.push(index);
                schedulePump();
            }
        }

        // render one page per frame to keep scrolling smooth
        function schedulePump() {
            if (pumpScheduled) {
                return;
            }

            pumpScheduled = true;

            requestAnimationFrame(() => {
                pumpScheduled = false;

                const index = renderQueue.shift();

                if (index === undefined || !activeDocument) {
                    return;
                }

                paintPage(index);

                if (renderQueue.length > 0) {
                    schedulePump();
                }
            });
        }

        function paintPage(index) {
            const page = dom.pagesContainer.children[index];

            if (!page || activeDocument.rendered.has(index)) {
                return;
            }

            const imageData = renderPage(index);

            const canvas = document.createElement('canvas');
            canvas.width = imageData.width;
            canvas.height = imageData.height;
            canvas.getContext('2d').putImageData(imageData, 0, 0);

            page.innerHTML = "";
            page.appendChild(canvas);
            activeDocument.rendered.add(index);
        }

        function releasePage(page, index) {
            page.innerHTML = '<div class="page-placeholder"><div class="page-spinner"></div></div>';
            activeDocument.rendered.delete(index);
        }

        // find the page closest to the viewport center for the page indicator
        function updateCurrentPage() {
            const container = dom.pagesContainer;
            const center = container.scrollTop + container.clientHeight / 2;

            let closest = 1;
            let smallest = Infinity;

            for (const page of container.children) {
                const pageCenter = page.offsetTop + page.offsetHeight / 2;
                const distance = Math.abs(pageCenter - center);

                if (distance < smallest) {
                    smallest = distance;
                    closest = Number(page.dataset.index) + 1;
                }
            }

            currentPage = closest;
            dom.pageInput.value = String(closest);
            dom.prevPage.disabled = closest <= 1;
            dom.nextPage.disabled = closest >= activeDocument.pageCount;
        }

        function scrollToPage(number) {
            const clamped = Math.min(Math.max(number, 1), activeDocument.pageCount);
            const page = dom.pagesContainer.children[clamped - 1];

            if (page) {
                dom.pagesContainer.scrollTo({ top: page.offsetTop - 16, behavior: 'smooth' });
            }
        }

        // re-layout every page when the zoom changes and re-render what is visible
        function applyZoom(nextZoom) {
            zoom = Math.min(Math.max(nextZoom, MIN_ZOOM), MAX_ZOOM);
            dom.zoomLevel.textContent = Math.round(zoom * 100) + "%";

            for (const page of dom.pagesContainer.children) {
                const index = Number(page.dataset.index);
                applyPageSize(page, getPageSize(index));

                if (activeDocument.rendered.has(index)) {
                    releasePage(page, index);
                }
            }

            renderQueue = [];
            refreshVisiblePages();
        }

        // manual zoom from the user, which turns off automatic width fitting
        function setZoom(nextZoom) {
            fitMode = false;
            applyZoom(nextZoom);
        }

        // fit to the widest page so mixed-size documents never overflow horizontally
        function fitWidth() {
            const available = dom.pagesContainer.clientWidth - 24;

            let widest = 0;

            for (let index = 0; index < activeDocument.pageCount; index++) {
                widest = Math.max(widest, getPageSize(index).width);
            }

            fitMode = true;
            applyZoom(available / widest);
        }

        // file sources
        async function openFromFile(file) {
            try {
                setLoading(true, "Reading file…");
                log('Reading file "' + file.name + '"');

                await engineReady;
                const buffer = await file.arrayBuffer();
                openDocument(new Uint8Array(buffer), file.name);

                setLoading(false);
            } catch (error) {
                setLoading(false);
                showError(error.message);
            }
        }

        async function openFromURL(url) {
            try {
                setLoading(true, "Downloading…");
                log("Downloading " + url);

                await engineReady;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error("could not download the file");
                }

                const buffer = await response.arrayBuffer();
                const name = decodeURIComponent(url.split('/').pop() || "document.pdf");
                openDocument(new Uint8Array(buffer), name);

                setLoading(false);
            } catch (error) {
                setLoading(false);
                showError(error.message);
            }
        }

        function downloadActive() {
            const blob = new Blob([activeDocument.bytes], { type: 'application/pdf' });
            const link = document.createElement('a');

            link.href = URL.createObjectURL(blob);
            link.download = activeDocument.name;
            link.click();

            URL.revokeObjectURL(link.href);
        }

        // ui state
        function showViewer(name, pageCount) {
            dom.fileTitle.textContent = name;
            dom.pageCount.textContent = String(pageCount);
            dom.startScreen.style.display = "none";
            dom.viewer.style.display = "flex";

            document.title = name + " - PDF Viewer";
            zoom = 1.0;
            dom.zoomLevel.textContent = "100%";
        }

        function showStart() {
            closeDocument();
            dom.viewer.style.display = "none";
            dom.startScreen.style.display = "flex";
            document.title = "PDFium PDF Viewer";
        }

        function setLoading(active, text) {
            if (!dom.loadingOverlay) {
                return;
            }

            if (text) {
                dom.loadingText.textContent = text;
            }

            dom.loadingOverlay.classList.toggle('is-hidden', !active);
        }

        let toastTimer = null;

        function showError(message) {
            log("Error: " + message);

            dom.toast.textContent = message;
            dom.toast.classList.add('is-active');

            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => dom.toast.classList.remove('is-active'), 4000);
        }

        function log(message) {
            if (!dom.debugConsoleContent) {
                return;
            }

            const line = document.createElement('p');
            line.textContent = "➔ [" + new Date().toLocaleTimeString() + "] " + message;
            dom.debugConsoleContent.prepend(line);
        }

        // wiring
        function bindEvents() {
            dom.dropzone.onclick = () => dom.fileInput.click();

            dom.fileInput.onchange = () => {
                const file = dom.fileInput.files[0];

                // reset so picking the same file again still fires the change event
                dom.fileInput.value = "";

                if (file) {
                    openFromFile(file);
                }
            };

            dom.urlButton.onclick = () => dom.urlInput.value && openFromURL(dom.urlInput.value.trim());

            dom.urlInput.onkeydown = (event) => {
                if (event.key === 'Enter') {
                    dom.urlButton.click();
                }
            };

            dom.openButton.onclick = showStart;
            dom.downloadButton.onclick = downloadActive;

            dom.prevPage.onclick = () => scrollToPage(currentPage - 1);
            dom.nextPage.onclick = () => scrollToPage(currentPage + 1);
            dom.pageInput.onchange = () => scrollToPage(Number(dom.pageInput.value));

            dom.zoomIn.onclick = () => setZoom(zoom + ZOOM_STEP);
            dom.zoomOut.onclick = () => setZoom(zoom - ZOOM_STEP);
            dom.fitWidth.onclick = fitWidth;

            dom.pagesContainer.onscroll = onScroll;

            // ctrl + wheel zooms, like a native viewer
            dom.pagesContainer.addEventListener('wheel', (event) => {
                if (event.ctrlKey) {
                    event.preventDefault();
                    setZoom(zoom + (event.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
                }
            }, { passive: false });

            // keep fitting to width on resize and rotation unless the user zoomed manually
            window.onresize = () => {
                if (!activeDocument) {
                    return;
                }

                if (fitMode) {
                    fitWidth();
                } else {
                    refreshVisiblePages();
                }
            };
            document.onkeydown = onKeyDown;

            bindDragAndDrop();
        }

        function onScroll() {
            if (scrollRaf) {
                return;
            }

            scrollRaf = requestAnimationFrame(() => {
                scrollRaf = null;
                refreshVisiblePages();
            });
        }

        function onKeyDown(event) {
            if (!activeDocument || dom.viewer.style.display === "none") {
                return;
            }

            const actions = {
                ArrowLeft: () => scrollToPage(currentPage - 1),
                ArrowRight: () => scrollToPage(currentPage + 1),
                Home: () => scrollToPage(1),
                End: () => scrollToPage(activeDocument.pageCount),
            };

            if (actions[event.key]) {
                actions[event.key]();
                event.preventDefault();
            }
        }

        // accept a dropped pdf anywhere on the window, even while a document is open
        function bindDragAndDrop() {
            const stop = (event) => {
                event.preventDefault();
                event.stopPropagation();
            };

            const hasFiles = (event) => Array.from(event.dataTransfer?.types || []).includes('Files');

            // a counter keeps the overlay stable across nested dragenter and dragleave events
            let dragDepth = 0;

            window.addEventListener('dragenter', (event) => {
                if (!hasFiles(event)) {
                    return;
                }

                stop(event);
                dragDepth++;
                dom.dropOverlay.classList.add('is-active');
            });

            window.addEventListener('dragover', (event) => hasFiles(event) && stop(event));

            window.addEventListener('dragleave', (event) => {
                if (!hasFiles(event)) {
                    return;
                }

                stop(event);
                dragDepth = Math.max(0, dragDepth - 1);

                if (dragDepth === 0) {
                    dom.dropOverlay.classList.remove('is-active');
                }
            });

            window.addEventListener('drop', (event) => {
                if (!hasFiles(event)) {
                    return;
                }

                stop(event);
                dragDepth = 0;
                dom.dropOverlay.classList.remove('is-active');

                const file = Array.from(event.dataTransfer.files).find((f) => f.type === 'application/pdf');

                if (file) {
                    openFromFile(file);
                } else {
                    showError("Please drop a PDF file.");
                }
            });
        }

        // theme: "system" follows prefers-color-scheme, "light" and "dark" force a scheme
        function applyTheme(choice) {
            if (choice === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', choice);
            }

            localStorage.setItem('pdfviewer-theme', choice);

            for (const button of document.querySelectorAll('[data-theme-choice]')) {
                button.classList.toggle('is-link', button.dataset.themeChoice === choice);
            }
        }

        function setupTheme() {
            const saved = localStorage.getItem('pdfviewer-theme') || 'system';

            applyTheme(saved);

            for (const button of document.querySelectorAll('[data-theme-choice]')) {
                button.onclick = () => applyTheme(button.dataset.themeChoice);
            }
        }

        function getUrlParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        // apply optional url parameters: url, title, debug
        function applyUrlParams() {
            const url = getUrlParam("url");
            const title = getUrlParam("title");

            if (getUrlParam("debug") === "1") {
                dom.debugConsole.style.display = "block";
            }

            if (title) {
                document.title = decodeURIComponent(title) + " - PDF Viewer";
            }

            if (url) {
                openFromURL(decodeURIComponent(url));
            }
        }

        function init() {
            const ids = [
                'startScreen', 'viewer', 'dropzone', 'fileInput', 'urlInput', 'urlButton',
                'openButton', 'fileTitle', 'pagesContainer', 'prevPage', 'nextPage', 'pageInput',
                'pageCount', 'zoomOut', 'zoomIn', 'zoomLevel', 'fitWidth', 'downloadButton',
                'loadingOverlay', 'loadingText', 'dropOverlay', 'toast', 'debugConsole', 'debugConsoleContent',
            ];

            for (const id of ids) {
                dom[id] = document.getElementById(id);
            }

            if (!('WebAssembly' in window)) {
                setLoading(false);
                showError("Your browser does not support WebAssembly.");
                return;
            }

            setupTheme();
            bindEvents();
            applyUrlParams();
        }

        // the script runs at the end of the body, so the dom is already available
        init();
    </script>
